<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 입지? - 라이브 날씨 옷차림</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>👕 오늘 뭐 입지?</h1>
            <p id="location">위치 정보 가져오는 중...</p>
            <div id="current-weather">
                <span id="temp-display">--°C</span>
                <span id="weather-desc">날씨 정보 로딩...</span>
                <span id="rain-display"></span>
            </div>
        </header>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchDay('today')">오늘의 옷차림</button>
            <button class="tab-btn" onclick="switchDay('tomorrow')">내일의 옷차림</button>
        </div>

        <section class="outfit-section">
            <table class="outfit-table">
                <tbody>
                    <tr>
                        <th>외투</th>
                        <td id="outfit-outer">-</td>
                    </tr>
                    <tr>
                        <th>상의</th>
                        <td id="outfit-top">-</td>
                    </tr>
                    <tr>
                        <th>하의</th>
                        <td id="outfit-bottom">-</td>
                    </tr>
                    <tr>
                        <th>복합/기타</th>
                        <td id="outfit-etc">-</td>
                    </tr>
                </tbody>
            </table>
        </section>

<section class="graph-section">
            <h2 id="graph-title">📈 시간대별 기온 변화 (오늘)</h2>
            <div class="chart-scroll-container" id="chartWrapper">
                <div class="chart-inner-canvas">
                    <div class="chart-bg-layer" id="chartBg"></div>
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
        </section>

        <section class="forecast-section">
            <h2>📅 주간 날씨 예보</h2>
            <table class="forecast-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>날씨</th>
                        <th>최저</th>
                        <th>최고</th>
                    </tr>
                </thead>
                <tbody id="forecast-body"></tbody>
            </table>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
